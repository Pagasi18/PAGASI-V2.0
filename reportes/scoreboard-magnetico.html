<!DOCTYPE html>
<html lang="es-VE">
<head>
<meta charset="UTF-8">
<title>Pagasi · Scoreboard Magnético 300×1200mm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@800;900&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  @page { size: 300mm 1200mm; margin: 0; }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .board{
    width:300mm;height:1200mm;position:relative;overflow:hidden;color:#fff;
    background:
      radial-gradient(ellipse 90% 30% at 50% 0%, rgba(96,165,250,.40) 0%, transparent 60%),
      radial-gradient(ellipse 80% 25% at 50% 100%, rgba(30,58,138,.9) 0%, transparent 70%),
      linear-gradient(170deg,#2563EB 0%,#1D4ED8 38%,#1E3A8A 100%);
    display:flex;flex-direction:column;align-items:center;
    padding:34mm 20mm 26mm;
  }
  /* Speedlines diagonales sutiles */
  .board::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.05) 0 3px, transparent 3px 90px);
    mask-image:linear-gradient(180deg,#000 0%, transparent 45%, transparent 60%, #000 100%);
  }
  /* Pegaso gigante de fondo */
  .peg-bg{position:absolute;width:290mm;left:50%;top:46%;transform:translate(-50%,-50%) rotate(-5deg);opacity:.10;pointer-events:none}

  .logo{width:188mm;height:auto;position:relative;z-index:2;filter:drop-shadow(0 6mm 10mm rgba(0,10,50,.35))}

  .badge{
    position:relative;z-index:2;margin-top:14mm;
    background:#fff;color:#1D4ED8;
    font-family:'Inter Tight';font-weight:900;font-size:64px;letter-spacing:.22em;text-transform:uppercase;
    padding:7mm 18mm 7mm 19mm;border-radius:100px;
    box-shadow:0 5mm 14mm rgba(0,10,50,.35), inset 0 2px 0 #fff;
  }
  .tagline{
    position:relative;z-index:2;margin-top:9mm;
    font-family:'Inter Tight';font-weight:800;font-size:54px;letter-spacing:-.01em;color:#fff;
  }
  .tagline .lt{color:#93C5FD}

  .slots{position:relative;z-index:2;width:100%;margin-top:14mm;display:flex;flex-direction:column;justify-content:space-between;flex:1}
  .slot{display:flex;align-items:center;gap:8mm}
  .slot-n{
    font-family:'Inter Tight';font-weight:900;font-size:118px;line-height:1;color:#fff;min-width:40mm;text-align:center;letter-spacing:-.03em;
    text-shadow:0 3mm 6mm rgba(0,10,50,.3);
  }
  .slot-strip{flex:1;height:70mm;background:#fff;border-radius:9mm;
    box-shadow:0 4mm 10mm rgba(0,10,50,.30), inset 0 -3mm 0 rgba(37,99,235,.10);
    position:relative;
  }
  /* Top 3 destacados */
  .slot.s1 .slot-strip{box-shadow:0 0 0 3.5mm rgba(255,255,255,.35), 0 5mm 14mm rgba(0,10,50,.4)}
  .slot.s1 .slot-n{color:#fff;font-size:132px}
  .slot.s2 .slot-n,.slot.s3 .slot-n{color:#BFDBFE}
  .crown{display:block;width:24mm;height:auto;margin:0 auto 3mm}

  .foot{position:relative;z-index:2;width:100%;display:flex;align-items:center;justify-content:space-between;margin-top:14mm;padding-top:10mm;border-top:1.2mm solid rgba(255,255,255,.25)}
  .foot-l{display:flex;align-items:center;gap:7mm}
  .peg-foot{width:42mm;height:auto;opacity:.95}
  .foot-frase{font-family:'Inter Tight';font-weight:800;font-size:48px;letter-spacing:-.01em}
  .foot-frase .lt{color:#93C5FD}
  .foot-url{font-family:'Inter Tight';font-weight:900;font-size:52px;letter-spacing:.02em;color:#fff}
</style>
</head>
